<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마인크래프트 프리에디션</title>
    <link rel="icon" type="image/png" href="사진/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="blocker">
        <div id="instructions">
            <p style="font-size:36px">클릭하여 시작</p>
            <p>(W, A, S, D = 이동, MOUSE = 둘러보기, SPACE = 점프/비행)</p>
            <div id="menu-buttons">
                <button id="save-btn" class="menu-btn">게임 저장</button>
                <button id="load-btn" class="menu-btn">게임 불러오기</button>
            </div>
        </div>
    </div>

    <div id="load-menu" class="overlay">
        <div class="menu-content">
            <h2>게임 불러오기</h2>
            <div id="save-list">
                <!-- 저장된 게임 목록이 여기에 표시됨 -->
            </div>
            <button id="close-load-btn" class="menu-btn">닫기</button>
        </div>
    </div>

    <div id="loading-overlay" class="overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>처리 중...</p>
        </div>
    </div>
    <div id="crosshair"></div>
    <div id="inventory">
        <div class="slot active" data-slot="0" data-type="grass"></div>
        <div class="slot" data-slot="1" data-type="dirt"></div>
        <div class="slot" data-slot="2" data-type="stone"></div>
        <div class="slot" data-slot="3" data-type="wood"></div>
        <div class="slot" data-slot="4" data-type="leaves"></div>
        <div class="slot" data-slot="5"></div>
        <div class="slot" data-slot="6"></div>
        <div class="slot" data-slot="7"></div>
        <div class="slot" data-slot="8"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
